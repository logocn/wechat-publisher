name: 发布微信公众号文章

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      article:
        description: '文章文件名 (如: article.md)'
        required: true
        default: 'article.md'
      cover:
        description: '封面图文件名 (如: cover.jpg，可选)'
        required: false
        default: ''

  # 推送文章时自动触发
  push:
    paths:
      - 'articles/*.md'

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v3
    
    - name: 设置 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: 安装依赖
      run: pip install requests
    
    - name: 发布文章
      env:
        WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
        WECHAT_SECRET: ${{ secrets.WECHAT_SECRET }}
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          # 手动触发
          ARTICLE="${{ github.event.inputs.article }}"
          COVER="${{ github.event.inputs.cover }}"
        else
          # 自动触发，找最新修改的文章
          ARTICLE=$(git diff --name-only HEAD~1 HEAD | grep '^articles/.*\.md$' | head -1)
          COVER=""
        fi
        
        if [ -n "$ARTICLE" ]; then
          echo "发布文章: $ARTICLE"
          if [ -n "$COVER" ]; then
            python publish.py "$ARTICLE" "$COVER"
          else
            python publish.py "$ARTICLE"
          fi
        else
          echo "没有找到文章"
        fi
